<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Sessão de Treino</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ---- SESSÃO ---- */
        .sessao-header {
            background: var(--verde);
            color: white;
            padding: 16px 20px;
            margin: -20px -20px 20px;
            border-radius: 0 0 var(--radius) var(--radius);
        }

        .sessao-header h2 { font-size: 1.2rem; font-weight: 700; }
        .sessao-header .meta { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }

        /* ---- UPLOAD ZONE ---- */
        .upload-zone {
            border: 2px dashed var(--cinza-borda);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--branco);
        }

        .upload-zone:hover, .upload-zone.drag { 
            border-color: var(--verde); 
            background: var(--verde-claro);
        }

        .upload-zone-icon { font-size: 2.5rem; margin-bottom: 8px; }
        .upload-zone p { color: var(--cinza-meio); font-size: 0.9rem; }
        .upload-zone strong { color: var(--verde); }

        /* ---- BLOCO DE TREINO ---- */
        .bloco-treino {
            background: var(--branco);
            border-radius: var(--radius);
            margin-bottom: 14px;
            overflow: hidden;
            box-shadow: var(--sombra);
        }

        .bloco-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .bloco-header-info { flex: 1; }
        .bloco-titulo { font-weight: 700; font-size: 1rem; color: var(--azul-escuro); }
        .bloco-sub { font-size: 0.78rem; color: var(--cinza-meio); margin-top: 2px; }

        .bloco-badge {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 99px;
            background: var(--verde-claro);
            color: var(--verde);
        }

        .bloco-badge.laranja { background: #FEF3EE; color: var(--laranja); }
        .bloco-badge.cinza { background: var(--cinza-claro); color: var(--cinza-meio); }

        .bloco-corpo { padding: 0 16px 16px; }

        /* ---- EXERCÍCIO ---- */
        .exercicio-item {
            border: 1.5px solid var(--cinza-borda);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .exercicio-item.feito { border-color: var(--verde); }

        .exercicio-nome-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: var(--fundo);
        }

        .exercicio-check {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid var(--cinza-borda);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .exercicio-check.checked {
            background: var(--verde);
            border-color: var(--verde);
            color: white;
        }

        .exercicio-nome { font-weight: 600; font-size: 0.9rem; flex: 1; }
        .exercicio-ref { font-size: 0.75rem; color: var(--cinza-meio); }

        .exercicio-plan {
            padding: 8px 14px;
            font-size: 0.8rem;
            color: var(--cinza-meio);
            border-bottom: 1px solid var(--cinza-borda);
            background: var(--branco);
        }

        .exercicio-plan span { 
            background: var(--cinza-claro); 
            padding: 2px 8px; 
            border-radius: 4px; 
            margin-right: 6px;
            font-family: 'DM Mono', monospace;
        }

        .exercicio-registo {
            padding: 10px 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: var(--branco);
        }

        .registo-campo label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--cinza-meio);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: block;
            margin-bottom: 4px;
        }

        .registo-campo input {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid var(--cinza-borda);
            border-radius: var(--radius-sm);
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            color: var(--azul-escuro);
            background: var(--branco);
            outline: none;
            transition: border-color 0.15s;
        }

        .registo-campo input:focus { border-color: var(--verde); }

        .notas-exercicio {
            padding: 0 14px 10px;
            background: var(--branco);
        }

        .notas-exercicio textarea {
            width: 100%;
            border: 1.5px solid var(--cinza-borda);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            color: var(--cinza-meio);
            resize: none;
            min-height: 50px;
            outline: none;
        }

        .notas-exercicio textarea:focus { border-color: var(--verde); }

        /* ---- CRONÓMETRO WOD ---- */
        .cronometro-wrap {
            background: var(--azul-escuro);
            color: white;
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            margin-bottom: 10px;
        }

        .cron-titulo { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.7; margin-bottom: 8px; }

        .cron-display {
            font-family: 'DM Mono', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1;
            margin-bottom: 16px;
        }

        .cron-btns { display: flex; gap: 10px; justify-content: center; }

        .cron-btn {
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .cron-btn.start { background: var(--verde); color: white; }
        .cron-btn.stop { background: var(--laranja); color: white; }
        .cron-btn.reset { background: rgba(255,255,255,0.15); color: white; }

        .cron-rondas {
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .cron-rondas-label { font-size: 0.8rem; opacity: 0.7; }

        .cron-rondas-val {
            font-family: 'DM Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .cron-rondas-btns { display: flex; gap: 6px; }

        .cron-rondas-btns button {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-family: 'DM Sans', sans-serif;
        }

        /* ---- NOTA GERAL ---- */
        .nota-geral { margin-top: 6px; }

        /* ---- PROGRESSO ---- */
        .progresso-bar {
            background: var(--cinza-claro);
            border-radius: 99px;
            height: 6px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .progresso-fill {
            height: 100%;
            background: var(--verde);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        /* ---- COMPARAÇÃO ---- */
        .comparacao-box {
            background: var(--verde-claro);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-bottom: 10px;
            font-size: 0.82rem;
        }

        .comparacao-box strong { color: var(--verde); }

        /* ---- WARN SEMANA ---- */
        .warn-box {
            background: #FEF3EE;
            border-left: 3px solid var(--laranja);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 0.82rem;
            color: var(--cinza-texto);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<header class="header">
    <div style="display:flex; align-items:center; gap:10px;">
        <a href="index.html" style="color:var(--cinza-meio); display:flex;">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 id="header-titulo">Nova Sessão</h1>
    </div>
    <span class="header-data" id="header-data"></span>
</header>

<div class="page active" id="page-sessao">

    <!-- PASSO 1: Upload ou escolha -->
    <div id="passo-upload">
        <div class="card">
            <div class="card-titulo">Treino de hoje</div>
            <div class="form-grupo">
                <label>Data</label>
                <input type="date" id="sess-data">
            </div>
            <div class="form-grupo">
                <label>Nome</label>
                <input type="text" id="sess-nome" placeholder="ex: Treino Completo, Força Curta...">
            </div>
        </div>

        <div class="card">
            <div class="card-titulo">Plano do treino</div>
            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
                <div class="upload-zone-icon">📄</div>
                <p><strong>Clica para carregar o ficheiro .md</strong><br>gerado pelo Claude para hoje</p>
            </div>
            <input type="file" id="file-input" accept=".md,.txt" style="display:none" onchange="lerFicheiro(this)">

            <div style="margin-top:12px; text-align:center; color:var(--cinza-meio); font-size:0.82rem;">ou</div>

            <button class="btn btn-secundario" style="width:100%; margin-top:10px; justify-content:center;" onclick="semPlano()">
                Registar sem plano
            </button>
        </div>
    </div>

    <!-- PASSO 2: Treino em direto -->
    <div id="passo-treino" style="display:none;">

        <div id="sessao-header-info" class="sessao-header"></div>

        <!-- Progresso -->
        <div class="progresso-bar">
            <div class="progresso-fill" id="progresso-fill" style="width:0%"></div>
        </div>

        <!-- Comparação com sessão anterior -->
        <div id="comparacao-anterior" style="display:none;"></div>

        <!-- Conteúdo do plano -->
        <div id="plano-conteudo"></div>

        <!-- Notas gerais -->
        <div class="card nota-geral">
            <div class="card-titulo">Notas gerais</div>
            <textarea id="sess-notas" placeholder="Como correu? Sensações, dificuldades..." 
                style="width:100%; border:1.5px solid var(--cinza-borda); border-radius:var(--radius-sm); padding:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; resize:vertical; min-height:80px; outline:none;"></textarea>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn btn-secundario" style="flex:1;" onclick="guardarProgresso()">
                💾 Guardar progresso
            </button>
            <button class="btn btn-primario" style="flex:2;" onclick="terminarTreino()">
                ✓ Terminar treino
            </button>
        </div>
    </div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>

// ---- AUTH ----
async function verificarAuth() {
    const { data: { user } } = await db.auth.getUser();
    if (!user) window.location.href = 'login.html';
}
verificarAuth();

// ---- ESTADO ----
let planoMD = '';
let blocosData = [];
let exerciciosFeitos = new Set();
let exerciciosAnteriores = {}; // { nome_lower: { peso_kg, reps } }
let cronometroInterval = null;
let cronometroSegundos = 0;
let cronometroAtivo = false;
let rondasWOD = 0;
let counterExInterval = null;
let counterExSegundos = 0;
let counterExAtivo = false;

// ---- INIT ----
document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('sess-data').value = hoje();
    document.getElementById('header-data').textContent = new Date().toLocaleDateString('pt-PT', {
        weekday: 'short', day: 'numeric', month: 'long'
    });

    // Drag & drop
    const zone = document.getElementById('upload-zone');
    if (zone) {
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('drag');
            const file = e.dataTransfer.files[0];
            if (file) processarFicheiro(file);
        });
    }

    // Ver detalhes de sessão existente
    const params = new URLSearchParams(window.location.search);
    const sessaoId = params.get('id');
    const gerado = params.get('gerado');

    if (sessaoId) {
        await verDetalhesSessao(sessaoId);
    } else if (gerado === '1') {
        // Treino gerado pelo Claude — carregar automaticamente
        const mdGerado = sessionStorage.getItem('treino_gerado_md');
        const dataGerado = sessionStorage.getItem('treino_gerado_data');
        if (mdGerado) {
            sessionStorage.removeItem('treino_gerado_md');
            planoMD = mdGerado;
            // Auto-preencher nome a partir do MD
            const matchNome = mdGerado.match(/^#\s+(.+)/m);
            if (matchNome) {
                document.getElementById('sess-nome').value = matchNome[1].replace(/[🔴🔵🟡🟢]/g, '').trim();
            }
            if (dataGerado) document.getElementById('sess-data').value = dataGerado;
            mostrarToast('Treino gerado pelo Claude ✓');
            await iniciarTreino();
        }
    }
});

async function verDetalhesSessao(id) {
    const { data: rows } = await db
        .from('sessoes_treino')
        .select('*, exercicios_sessao(*)')
        .eq('id', id)
        .limit(1);

    const s = rows && rows.length > 0 ? rows[0] : null;
    if (!s) { mostrarToast('Sessão não encontrada'); return; }

    // Esconde upload, mostra detalhes
    document.getElementById('passo-upload').style.display = 'none';
    document.getElementById('passo-treino').style.display = 'block';

    const dataFormatada = new Date(s.data + 'T00:00:00').toLocaleDateString('pt-PT', {
        weekday: 'long', day: 'numeric', month: 'long'
    });

    const tempo = s.tempo_wod
        ? `${Math.floor(s.tempo_wod/60)}:${String(s.tempo_wod%60).padStart(2,'0')}`
        : null;

    document.getElementById('header-titulo').textContent = 'Detalhes';
    document.getElementById('sessao-header-info').innerHTML = `
        <h2>${s.nome_treino}</h2>
        <div class="meta">${dataFormatada}${tempo ? ' · ⏱ ' + tempo : ''}${s.rounds_completos ? ' · 🔄 ' + s.rounds_completos + ' rondas' : ''}</div>
    `;

    // Exercícios
    const exs = (s.exercicios_sessao || []).sort((a,b) => a.ordem - b.ordem);
    const planoEl = document.getElementById('plano-conteudo');
    const guardarBtn = document.querySelector('button[onclick="guardarSessaoCompleta()"]');
    if (guardarBtn) guardarBtn.style.display = 'none';

    if (exs.length > 0) {
        planoEl.innerHTML = `
            <div class="card">
                <div class="card-titulo">Exercícios registados</div>
                ${exs.map(ex => `
                    <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--cinza-claro);">
                        <div>
                            <div style="font-weight:600; font-size:0.9rem;">${ex.nome}</div>
                            ${ex.notas ? `<div style="font-size:0.78rem; color:var(--cinza-meio);">${ex.notas}</div>` : ''}
                        </div>
                        <div style="text-align:right; font-family:'DM Mono',monospace; font-size:0.85rem; color:var(--verde);">
                            ${ex.peso_kg ? ex.peso_kg + ' kg' : ''}
                            ${ex.peso_kg && ex.reps ? ' · ' : ''}
                            ${ex.reps || ''}
                        </div>
                    </div>
                `).join('')}
            </div>`;
    } else {
        planoEl.innerHTML = '<div class="card"><div style="color:var(--cinza-meio); font-size:0.9rem;">Sem exercícios registados.</div></div>';
    }

    if (s.notas) {
        document.getElementById('sess-notas').value = s.notas;
        document.getElementById('sess-notas').disabled = true;
    }

    // Comparação com sessão anterior
    await mostrarComparacaoDetalhada(s);

    // Resumo para Claude + campo de sugestões
    mostrarResumoExportavel(s, exs);
    mostrarCampoSugestoes(s);
}

async function mostrarComparacaoDetalhada(sessaoAtual) {
    try {
        const { data } = await db
            .from('sessoes_treino')
            .select('*, exercicios_sessao(*)')
            .ilike('nome_treino', `%${sessaoAtual.nome_treino.split(' ')[0]}%`)
            .neq('id', sessaoAtual.id)
            .order('data', { ascending: false })
            .limit(1);

        if (!data || data.length === 0) return;

        const anterior = data[0];
        const dataAnt = new Date(anterior.data + 'T00:00:00').toLocaleDateString('pt-PT', { day: 'numeric', month: 'short' });
        const dataAtual = new Date(sessaoAtual.data + 'T00:00:00').toLocaleDateString('pt-PT', { day: 'numeric', month: 'short' });

        const tempoAnt = anterior.tempo_wod ? `${Math.floor(anterior.tempo_wod/60)}:${String(anterior.tempo_wod%60).padStart(2,'0')}` : '—';
        const tempoAtual = sessaoAtual.tempo_wod ? `${Math.floor(sessaoAtual.tempo_wod/60)}:${String(sessaoAtual.tempo_wod%60).padStart(2,'0')}` : '—';

        const melhorTempo = sessaoAtual.tempo_wod && anterior.tempo_wod
            ? sessaoAtual.tempo_wod < anterior.tempo_wod ? '⬇️ Mais rápido!' : sessaoAtual.tempo_wod > anterior.tempo_wod ? '⬆️ Mais lento' : '= Igual'
            : '';

        const melhorRondas = sessaoAtual.rounds_completos && anterior.rounds_completos
            ? sessaoAtual.rounds_completos > anterior.rounds_completos ? '⬆️ Mais rondas!' : sessaoAtual.rounds_completos < anterior.rounds_completos ? '⬇️ Menos rondas' : '= Igual'
            : '';

        // Comparar exercícios
        const exsAnt = (anterior.exercicios_sessao || []).sort((a,b) => a.ordem - b.ordem);
        const exsAtual = (sessaoAtual.exercicios_sessao || []).sort((a,b) => a.ordem - b.ordem);

        let exComparacao = '';
        if (exsAnt.length > 0 && exsAtual.length > 0) {
            exComparacao = exsAtual.map(ex => {
                const match = exsAnt.find(e => e.nome.toLowerCase() === ex.nome.toLowerCase());
                if (!match) return '';
                const diffPeso = ex.peso_kg && match.peso_kg ? ex.peso_kg - match.peso_kg : null;
                const seta = diffPeso > 0 ? `<span style="color:var(--verde)">+${diffPeso}kg ⬆️</span>` 
                           : diffPeso < 0 ? `<span style="color:var(--laranja)">${diffPeso}kg ⬇️</span>`
                           : diffPeso === 0 ? '<span style="color:var(--cinza-meio)">= igual</span>' : '';
                return `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--cinza-claro); font-size:0.82rem;">
                        <span style="font-weight:500;">${ex.nome}</span>
                        <div style="text-align:right;">
                            <span style="color:var(--cinza-meio)">${match.peso_kg || '—'}kg</span>
                            <span style="color:var(--cinza-meio)"> → </span>
                            <span style="font-weight:600;">${ex.peso_kg || '—'}kg</span>
                            ${seta ? ' ' + seta : ''}
                        </div>
                    </div>`;
            }).filter(Boolean).join('');
        }

        const el = document.getElementById('comparacao-anterior');
        el.style.display = 'block';
        el.innerHTML = `
            <div class="card">
                <div class="card-titulo">Evolução vs sessão anterior</div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;">
                    <div style="text-align:center; padding:12px; background:var(--cinza-claro); border-radius:var(--radius-sm);">
                        <div style="font-size:0.7rem; color:var(--cinza-meio); margin-bottom:4px; text-transform:uppercase;">${dataAnt}</div>
                        <div style="font-family:'DM Mono',monospace; font-size:1.2rem; font-weight:700; color:var(--cinza-meio)">${tempoAnt}</div>
                        <div style="font-size:0.75rem; color:var(--cinza-meio)">${anterior.rounds_completos ? anterior.rounds_completos + ' rondas' : ''}</div>
                    </div>
                    <div style="text-align:center; padding:12px; background:var(--verde-claro); border-radius:var(--radius-sm); border:2px solid var(--verde);">
                        <div style="font-size:0.7rem; color:var(--verde); margin-bottom:4px; text-transform:uppercase;">${dataAtual} (hoje)</div>
                        <div style="font-family:'DM Mono',monospace; font-size:1.2rem; font-weight:700; color:var(--azul-escuro)">${tempoAtual}</div>
                        <div style="font-size:0.75rem; color:var(--cinza-meio)">${sessaoAtual.rounds_completos ? sessaoAtual.rounds_completos + ' rondas' : ''}</div>
                    </div>
                </div>

                ${melhorTempo || melhorRondas ? `
                <div style="text-align:center; font-weight:600; font-size:0.9rem; margin-bottom:12px; color:var(--verde);">
                    ${melhorTempo} ${melhorRondas}
                </div>` : ''}

                ${exComparacao ? `
                <div class="card-titulo" style="margin-top:4px;">Pesos por exercício</div>
                ${exComparacao}` : ''}
            </div>`;
    } catch(e) { console.error(e); }
}

function mostrarResumoExportavel(s, exs) {
    const tempo = s.tempo_wod ? `${Math.floor(s.tempo_wod/60)}:${String(s.tempo_wod%60).padStart(2,'0')}` : null;
    const data = new Date(s.data + 'T00:00:00').toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' });

    let texto = `## Sessão de treino — ${data}
`;
    texto += `**Treino:** ${s.nome_treino}
`;
    if (tempo) texto += `**Tempo WOD:** ${tempo}
`;
    if (s.rounds_completos) texto += `**Rondas:** ${s.rounds_completos}
`;
    if (s.notas) texto += `**Notas:** ${s.notas}
`;

    if (exs.length > 0) {
        texto += `
### Exercícios
`;

// ---- UPLOAD ----
function lerFicheiro(input) {
    if (input.files[0]) processarFicheiro(input.files[0]);
}

function processarFicheiro(file) {
    const reader = new FileReader();
    reader.onload = e => {
        planoMD = e.target.result;

        // Auto-preenche nome se não preenchido
        if (!document.getElementById('sess-nome').value) {
            const match = planoMD.match(/^#\s+(.+)/m);
            if (match) document.getElementById('sess-nome').value = match[1].replace(/[🔴🔵🟡🟢]/g, '').trim();
        }

        iniciarTreino();
    };
    reader.readAsText(file);
}

function semPlano() {
    planoMD = '';
    iniciarTreino();
}

// ---- PARSER MD ---- 
function parsearMD(md) {
    const blocos = [];
    const linhas = md.split('\n');
    let blocoAtual = null;
    let tabelaAtual = null;
    let emTabela = false;
    let emBloco = false;
    let avisoAtual = null;

    for (let i = 0; i < linhas.length; i++) {
        const linha = linhas[i].trim();

        // Título principal
        if (linha.startsWith('# ')) {
            continue;
        }

        // Bloco (## )
        if (linha.startsWith('## ')) {
            if (blocoAtual) blocos.push(blocoAtual);
            blocoAtual = {
                titulo: linha.replace('## ', '').replace(/[🔴🔵🟡🟢⚙️]/g, '').trim(),
                subtitulo: '',
                tipo: 'normal',
                rondas: null,
                peso_bloco: null,
                exercicios: [],
                avisos: [],
                texto: []
            };

            // Detectar tipo
            const t = blocoAtual.titulo.toLowerCase();
            if (t.includes('wod') || t.includes('amrap') || t.includes('emom')) blocoAtual.tipo = 'wod';
            if (t.includes('warm') || t.includes('aquecimento')) blocoAtual.tipo = 'warmup';
            if (t.includes('pélvico') || t.includes('core') || t.includes('finisher')) blocoAtual.tipo = 'finisher';
            if (t.includes('troca')) blocoAtual.tipo = 'info';

            emTabela = false;
            tabelaAtual = null;
            continue;
        }

        if (!blocoAtual) continue;

        // Subtítulo (linhas com ** no início, com ou sem | )
        if (linha.startsWith('**') && !linha.startsWith('| ')) {
            const subLinha = linha.replace(/\*\*/g, '');
            blocoAtual.subtitulo += subLinha + ' ';
            // Extrair rondas: "Formato: 4 rondas | ..."
            const rondasMatch = subLinha.match(/(\d+)\s*ronda/i) || subLinha.match(/(\d+)\s*round/i);
            if (rondasMatch) blocoAtual.rondas = parseInt(rondasMatch[1]);
            // Extrair peso do bloco: "Peso: 8 kg", "8–10 kg"
            const pesoMatch = subLinha.match(/(\d+)(?:[–\-]\d+)?\s*kg/);
            if (pesoMatch && !blocoAtual.peso_bloco) blocoAtual.peso_bloco = pesoMatch[0];
            continue;
        }

        // Avisos (> texto)
        if (linha.startsWith('> ')) {
            const texto = linha.replace('> ', '').replace(/\*\*/g, '');
            if (!texto.startsWith('🎥')) {
                blocoAtual.avisos.push(texto);
            }
            continue;
        }

        // Tabela
        if (linha.startsWith('|')) {
            const cells = linha.split('|').filter(c => c.trim() && !c.trim().match(/^-+$/));
            if (cells.length === 0) continue;

            // Header da tabela
            if (!emTabela) {
                emTabela = true;
                tabelaAtual = { headers: cells.map(c => c.trim()), rows: [] };
                continue;
            }

            // Linha separadora
            if (linha.includes('---')) continue;

            // Linha de dados
            if (tabelaAtual && cells.length > 0) {
                const row = cells.map(c => c.trim());
                // Primeira coluna é o exercício
                if (row[0] && !row[0].match(/^-+$/)) {
                    tabelaAtual.rows.push(row);
                }
            }
            continue;
        } else {
            // Fim de tabela — converter em exercícios
            if (emTabela && tabelaAtual && tabelaAtual.rows.length > 0) {
                for (const row of tabelaAtual.rows) {
                    const ex = {
                        nome: row[0] || '',
                        reps: row[1] || '',
                        notas: row[2] || '',
                        peso_plano: '',
                        feito: false
                    };

                    // peso_plano como sugestão do plano (placeholder apenas)
                    if (blocoAtual.peso_bloco) ex.peso_plano = blocoAtual.peso_bloco;
                    // Não herdar peso automaticamente — utilizador preenche

                    if (ex.nome && ex.nome.length > 1) {
                        blocoAtual.exercicios.push(ex);
                    }
                }
                emTabela = false;
                tabelaAtual = null;
            }
        }
    }

    if (blocoAtual) blocos.push(blocoAtual);
    return blocos.filter(b => b.exercicios.length > 0 || b.tipo === 'wod');
}

// ---- INICIAR TREINO ----
async function iniciarTreino() {
    const nome = document.getElementById('sess-nome').value.trim() || 'Treino';
    const data = document.getElementById('sess-data').value;

    document.getElementById('passo-upload').style.display = 'none';
    document.getElementById('passo-treino').style.display = 'block';

    // Header
    document.getElementById('sessao-header-info').innerHTML = `
        <h2>${nome}</h2>
        <div class="meta">${new Date(data + 'T00:00:00').toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
    `;

    // Carregar exercícios da sessão anterior para pré-preencher
    await carregarExerciciosAnteriores(nome);

    // Comparação com sessão anterior
    await mostrarComparacao(nome);

    // Parsear e renderizar plano
    if (planoMD) {
        blocosData = parsearMD(planoMD);
        renderizarPlano();
    } else {
        renderizarSemPlano();
    }
}

async function carregarExerciciosAnteriores(nome) {
    try {
        const { data } = await db
            .from('sessoes_treino')
            .select('*, exercicios_sessao(*)')
            .ilike('nome_treino', `%${nome.split(' ')[0]}%`)
            .order('data', { ascending: false })
            .limit(1);

        if (data && data.length > 0 && data[0].exercicios_sessao) {
            exerciciosAnteriores = {};
            for (const ex of data[0].exercicios_sessao) {
                exerciciosAnteriores[ex.nome.toLowerCase()] = {
                    peso_kg: ex.peso_kg,
                    reps: ex.reps
                };
            }
        }
    } catch(e) {}
}

async function mostrarComparacao(nome) {
    try {
        const { data } = await db
            .from('sessoes_treino')
            .select('*, exercicios_sessao(*)')
            .ilike('nome_treino', `%${nome.split(' ')[0]}%`)
            .order('data', { ascending: false })
            .limit(1);

        if (data && data.length > 0) {
            const s = data[0];
            const dataFormatada = new Date(s.data + 'T00:00:00').toLocaleDateString('pt-PT', { day: 'numeric', month: 'short' });
            const tempo = s.tempo_wod ? `${Math.floor(s.tempo_wod/60)}:${String(s.tempo_wod%60).padStart(2,'0')}` : '';
            const rounds = s.rounds_completos ? `${s.rounds_completos} rondas` : '';

            const el = document.getElementById('comparacao-anterior');
            el.style.display = 'block';
            el.innerHTML = `
                <div class="comparacao-box">
                    <strong>Última vez: ${dataFormatada}</strong>
                    ${tempo ? ` · ⏱ ${tempo}` : ''}
                    ${rounds ? ` · 🔄 ${rounds}` : ''}
                    ${s.notas ? `<div style="margin-top:4px; color:var(--cinza-meio);">${s.notas}</div>` : ''}
                </div>`;
        }
    } catch(e) {}
}

// ---- RENDERIZAR PLANO ----
function renderizarPlano() {
    const container = document.getElementById('plano-conteudo');
    container.innerHTML = '';

    blocosData.forEach((bloco, bi) => {
        if (bloco.tipo === 'info') return;

        const div = document.createElement('div');
        div.className = 'bloco-treino';

        const isWOD = bloco.tipo === 'wod';
        const isWarmup = bloco.tipo === 'warmup';
        const badgeClass = isWOD ? 'laranja' : isWarmup ? 'cinza' : '';
        const badgeText = isWOD ? 'WOD' : isWarmup ? 'Warm-up' : 'Bloco';
        const totalRondas = bloco.rondas || 1;
        const temRondas = bloco.rondas && !isWOD;

        // Gerar conteúdo dos exercícios — agrupado por ronda se aplicável
        let exerciciosHTML = '';
        if (temRondas) {
            for (let r = 1; r <= totalRondas; r++) {
                exerciciosHTML += `
                    <div style="margin-bottom:12px;">
                        <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                            <div style="background:var(--verde); color:white; font-size:0.7rem; font-weight:700; padding:3px 10px; border-radius:99px; text-transform:uppercase; letter-spacing:0.06em;">
                                Ronda ${r}/${totalRondas}
                            </div>
                            <div style="flex:1; height:1px; background:var(--cinza-borda);"></div>
                        </div>
                        ${bloco.exercicios.map((ex, ei) => renderExercicio(bi, ei, ex, r)).join('')}
                    </div>`;
            }
        } else {
            exerciciosHTML = bloco.exercicios.map((ex, ei) => renderExercicio(bi, ei, ex, 0)).join('');
        }

        div.innerHTML = `
            <div class="bloco-header" onclick="toggleBloco(${bi})">
                <div class="bloco-header-info">
                    <div class="bloco-titulo">${bloco.titulo}</div>
                    ${bloco.subtitulo ? `<div class="bloco-sub">${bloco.subtitulo.trim()}</div>` : ''}
                </div>
                <span class="bloco-badge ${badgeClass}">${badgeText}${temRondas ? ` · ${totalRondas} rondas` : ''}</span>
            </div>
            <div class="bloco-corpo" id="bloco-corpo-${bi}">
                ${bloco.avisos.map(a => `<div class="warn-box">${a}</div>`).join('')}
                ${isWOD ? renderCronometro() : ''}
                ${exerciciosHTML}
            </div>`;

        container.appendChild(div);
    });

    atualizarProgresso();
}

let rondasBloco = {}; // { bi: rondaAtual }

function ajustarRondaBloco(bi, delta) {
    const bloco = blocosData[bi];
    if (!bloco) return;
    const total = bloco.rondas || 1;
    if (!rondasBloco[bi]) rondasBloco[bi] = 1;
    rondasBloco[bi] = Math.max(1, Math.min(total, rondasBloco[bi] + delta));
    document.getElementById(`ronda-atual-${bi}`).textContent = `${rondasBloco[bi]} / ${total}`;
}

// Counter por exercício (modal)
function abrirCounterEx(id, nome, repsPlano) {
    // Detectar se é tempo ou reps
    const eTempo = repsPlano.includes('seg') || repsPlano.includes('min') || repsPlano.includes('sec');
    const numMatch = repsPlano.match(/\d+/);
    const numVal = numMatch ? parseInt(numMatch[0]) : 10;

    // Criar modal de counter
    let modal = document.getElementById('modal-counter-ex');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'modal-counter-ex';
        modal.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300; display:flex; align-items:center; justify-content:center; flex-direction:column;';
        document.body.appendChild(modal);
    }

    let segundos = eTempo ? numVal : 0;
    let intervalo = null;
    let ativo = false;

    modal.innerHTML = `
        <div style="text-align:center; color:white; padding:20px;">
            <div style="font-size:0.85rem; opacity:0.7; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.1em;">${nome}</div>
            <div style="font-size:0.8rem; opacity:0.5; margin-bottom:20px;">${repsPlano || ''}</div>
            <div id="counter-display" style="font-family:'DM Mono',monospace; font-size:5rem; font-weight:700; line-height:1; margin-bottom:24px;">${eTempo ? numVal : 0}</div>
            <div style="display:flex; gap:12px; justify-content:center; margin-bottom:20px;">
                ${!eTempo ? `
                <button onclick="ajustarCounter(-1)" style="width:56px; height:56px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); background:none; color:white; font-size:1.5rem; cursor:pointer;">−</button>
                ` : ''}
                <button id="btn-counter" onclick="toggleCounter(${eTempo}, ${numVal})" style="width:80px; height:80px; border-radius:50%; background:var(--verde); border:none; color:white; font-size:1.5rem; cursor:pointer;">▶</button>
                ${!eTempo ? `
                <button onclick="ajustarCounter(1)" style="width:56px; height:56px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); background:none; color:white; font-size:1.5rem; cursor:pointer;">+</button>
                ` : ''}
            </div>
            <button onclick="fecharCounterEx('${id}')" style="background:rgba(255,255,255,0.15); border:none; color:white; padding:12px 28px; border-radius:99px; font-family:'DM Sans',sans-serif; font-size:0.9rem; cursor:pointer;">✓ Feito</button>
            <button onclick="cancelarCounterEx()" style="background:none; border:none; color:rgba(255,255,255,0.4); padding:12px 16px; font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; display:block; margin:8px auto 0;">Cancelar</button>
        </div>`;

    // Guardar estado
    modal._segundos = segundos;
    modal._eTempo = eTempo;
    modal._numVal = numVal;
    modal._intervalo = null;
    modal._ativo = false;

    modal.style.display = 'flex';
}

function ajustarCounter(delta) {
    const modal = document.getElementById('modal-counter-ex');
    if (!modal) return;
    modal._segundos = Math.max(0, modal._segundos + delta);
    document.getElementById('counter-display').textContent = modal._segundos;
}

function toggleCounter(eTempo, numVal) {
    const modal = document.getElementById('modal-counter-ex');
    const btn = document.getElementById('btn-counter');
    if (!modal) return;

    if (modal._ativo) {
        clearInterval(modal._intervalo);
        modal._ativo = false;
        btn.textContent = '▶';
        btn.style.background = 'var(--verde)';
    } else {
        modal._ativo = true;
        btn.textContent = '⏸';
        btn.style.background = 'var(--laranja)';
        modal._intervalo = setInterval(() => {
            if (eTempo) {
                modal._segundos = Math.max(0, modal._segundos - 1);
                if (modal._segundos === 0) {
                    clearInterval(modal._intervalo);
                    modal._ativo = false;
                    btn.textContent = '▶';
                    btn.style.background = 'var(--verde)';
                    // Vibrar se disponível
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
            } else {
                modal._segundos++;
            }
            document.getElementById('counter-display').textContent = modal._segundos;
        }, 1000);
    }
}

function fecharCounterEx(exId) {
    const modal = document.getElementById('modal-counter-ex');
    if (modal) {
        clearInterval(modal._intervalo);
        modal.style.display = 'none';
    }
    // Marcar exercício como feito
    toggleFeito(exId, parseInt(exId.split('-')[1]), parseInt(exId.split('-')[2]));
}

function cancelarCounterEx() {
    const modal = document.getElementById('modal-counter-ex');
    if (modal) {
        clearInterval(modal._intervalo);
        modal.style.display = 'none';
    }
}

function renderExercicio(bi, ei, ex, ronda) {
    // ronda=0 significa sem rondas; ronda>=1 significa ronda específica
    const id = ronda > 0 ? `ex-${bi}-${ei}-r${ronda}` : `ex-${bi}-${ei}`;
    const anterior = exerciciosAnteriores[ex.nome.toLowerCase()] || {};
    // Pré-preencher só com peso da sessão anterior (não do plano)
    const pesoValor = anterior.peso_kg ? anterior.peso_kg : '';
    const repsValor = ronda > 0 ? (ex.reps || '') : (anterior.reps || ex.reps || '');

    return `
        <div class="exercicio-item" id="${id}">
            <div class="exercicio-nome-row">
                <div class="exercicio-check" id="check-${id}" onclick="toggleFeito('${id}')"></div>
                <div class="exercicio-nome">${ex.nome}</div>
                <button onclick="abrirCounterEx('${id}', '${ex.nome.replace(/'/g,"\'")}', '${ex.reps || ''}')"
                    style="background:none; border:none; cursor:pointer; color:var(--verde); font-size:1.1rem; padding:4px;" title="Contador">⏱</button>
            </div>
            ${(ex.reps || ex.peso_plano) ? `
            <div class="exercicio-plan">
                ${ex.reps ? `<span>${ex.reps}</span>` : ''}
                ${ex.peso_plano ? `<span>🏋️ ${ex.peso_plano}</span>` : ''}
                ${ex.notas ? `<span style="background:none; padding:0; margin:0; color:var(--cinza-meio);">${ex.notas}</span>` : ''}
            </div>` : ''}
            <div class="exercicio-registo">
                <div class="registo-campo">
                    <label>Peso${anterior.peso_kg && ronda <= 1 ? ' <span style="color:var(--verde);font-size:0.65rem;">↩</span>' : ''}</label>
                    <input type="text" id="peso-${id}" value="${ronda <= 1 ? pesoValor : ''}" placeholder="${ex.peso_plano || 'kg'}"
                        oninput="autoFeito('${id}')">
                </div>
                <div class="registo-campo">
                    <label>Reps</label>
                    <input type="text" id="reps-${id}" value="${ronda <= 1 ? repsValor : ''}" placeholder="${ex.reps || 'reps'}"
                        oninput="autoFeito('${id}')">
                </div>
            </div>
        </div>`;
}

// ---- INTERAÇÕES ----
function toggleBloco(bi) {
    const corpo = document.getElementById(`bloco-corpo-${bi}`);
    corpo.style.display = corpo.style.display === 'none' ? 'block' : 'none';
}

function toggleFeito(id) {
    const check = document.getElementById(`check-${id}`);
    const item = document.getElementById(id);
    if (!check || !item) return;
    const feito = !check.classList.contains('checked');

    check.classList.toggle('checked', feito);
    check.innerHTML = feito ? '✓' : '';
    item.classList.toggle('feito', feito);

    if (feito) exerciciosFeitos.add(id);
    else exerciciosFeitos.delete(id);

    atualizarProgresso();
}

function toggleFeitoLivre(id) {
    const check = document.getElementById(`check-${id}`);
    const item = document.getElementById(id);
    const feito = !check.classList.contains('checked');
    check.classList.toggle('checked', feito);
    check.innerHTML = feito ? '✓' : '';
    item.classList.toggle('feito', feito);
}

    }

function atualizarProgresso() {
    const total = document.querySelectorAll('.exercicio-item').length;
    const feitos = exerciciosFeitos.size;
    const pct = total > 0 ? (feitos / total) * 100 : 0;
    document.getElementById('progresso-fill').style.width = pct + '%';
}

// ---- CRONÓMETRO ----
function toggleCronometro() {
    if (cronometroAtivo) {
        clearInterval(cronometroInterval);
        cronometroAtivo = false;
        document.getElementById('cron-start').textContent = '▶ Continuar';
        document.getElementById('cron-start').className = 'cron-btn start';
    } else {
        cronometroAtivo = true;
        document.getElementById('cron-start').textContent = '⏸ Parar';
        document.getElementById('cron-start').className = 'cron-btn stop';
        cronometroInterval = setInterval(() => {
            cronometroSegundos++;
            atualizarDisplayCron();
        }, 1000);
    }
}

function resetCronometro() {
    clearInterval(cronometroInterval);
    cronometroAtivo = false;
    cronometroSegundos = 0;
    atualizarDisplayCron();
    document.getElementById('cron-start').textContent = '▶ Iniciar';
    document.getElementById('cron-start').className = 'cron-btn start';
}

function atualizarDisplayCron() {
    const m = Math.floor(cronometroSegundos / 60);
    const s = cronometroSegundos % 60;
    document.getElementById('cron-display').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function ajustarRondas(delta) {
    rondasWOD = Math.max(0, rondasWOD + delta);
    document.getElementById('cron-rondas').textContent = rondasWOD;
}

async function guardarProgresso() {
    autosave();

async function terminarTreino() {
    await guardarSessaoCompleta(true);
}

async function guardarSessaoCompleta(mostrarResumo = false) {
    const nome = document.getElementById('sess-nome').value.trim() || 'Treino';
    const data = document.getElementById('sess-data').value;
    const notas = document.getElementById('sess-notas').value.trim();

    if (!data) { mostrarToast('Escolhe uma data'); return; }

    // Determinar tipo
    let tipo = 'Treino';
    const n = nome.toLowerCase();
    if (n.includes('completo')) tipo = 'WOD';
    else if (n.includes('força') || n.includes('forca')) tipo = 'Força';
    else if (n.includes('cardio')) tipo = 'Cardio';
    else if (n.includes('mobilidade')) tipo = 'Mobilidade';

    const payload = {
        data,
        nome_treino: nome,
        tipo,
        tempo_wod: cronometroSegundos > 0 ? cronometroSegundos : null,
        rounds_completos: rondasWOD > 0 ? rondasWOD : null,
        notas: notas || null,
        sugestoes_claude: null
    };

    const { data: sessao, error } = await db
        .from('sessoes_treino')
        .insert(payload)
        .select()
        .single();

    if (error) {
        mostrarToast('Erro ao guardar 😕');
        console.error(error);
        return;
    }

    // Guardar exercícios
    const exercicios = [];

    if (blocosData.length > 0) {
        let ordem = 0;
        blocosData.forEach((bloco, bi) => {
            const totalRondas = bloco.rondas || 1;
            const temRondas = bloco.rondas && bloco.tipo !== 'wod';
            bloco.exercicios.forEach((ex, ei) => {
                if (temRondas) {
                    for (let r = 1; r <= totalRondas; r++) {
                        const id = `ex-${bi}-${ei}-r${r}`;
                        const peso = document.getElementById(`peso-${id}`)?.value.trim();
                        const reps = document.getElementById(`reps-${id}`)?.value.trim();
                        if (peso || reps || exerciciosFeitos.has(id)) {
                            exercicios.push({
                                sessao_id: sessao.id,
                                nome: `${ex.nome} (R${r})`,
                                series: null,
                                reps: reps || ex.reps || null,
                                peso_kg: peso ? parseFloat(peso.replace(',', '.').replace('kg','')) : null,
                                notas: null,
                                ordem: ordem++
                            });
                        }
                    }
                } else {
                    const id = `ex-${bi}-${ei}`;
                    const peso = document.getElementById(`peso-${id}`)?.value.trim();
                    const reps = document.getElementById(`reps-${id}`)?.value.trim();
                    const nota = document.getElementById(`nota-${id}`)?.value.trim();
                    if (peso || reps || exerciciosFeitos.has(id)) {
                        exercicios.push({
                            sessao_id: sessao.id,
                            nome: ex.nome,
                            series: null,
                            reps: reps || ex.reps || null,
                            peso_kg: peso ? parseFloat(peso.replace(',', '.').replace('kg','')) : null,
                            notas: nota || null,
                            ordem: ordem++
                        });
                    }
                }
            });
        });
    }

    // Exercícios livres
    document.querySelectorAll('[id^="livre-"]').forEach(el => {
        const id = el.id;
        const nome = document.getElementById(`nome-${id}`)?.value.trim();
        const peso = document.getElementById(`peso-${id}`)?.value.trim();
        const reps = document.getElementById(`reps-${id}`)?.value.trim();
        if (nome) {
            exercicios.push({
                sessao_id: sessao.id,
                nome,
                reps: reps || null,
                peso_kg: peso ? parseFloat(peso.replace(',', '.').replace('kg','')) : null,
                notas: null,
                ordem: exercicios.length
            });
        }
    });

    if (exercicios.length > 0) {
        await db.from('exercicios_sessao').insert(exercicios);
    }

    // Atualizar benchmark automaticamente
    const benchmarkMsg = await atualizarBenchmarkAutomatico(nome, payload.tempo_wod, payload.rounds_completos, data);

    mostrarToast(benchmarkMsg ? `Sessão guardada · ${benchmarkMsg}` : 'Sessão guardada ✓');
    setTimeout(() => window.location.href = 'index.html', 1800);
}

async function atualizarBenchmarkAutomatico(nome, tempo_wod, rounds, data) {
    try {
        if (!tempo_wod && !rounds) return null;

        const tipo = tempo_wod ? 'tempo' : 'rondas';
        const valorAtual = tempo_wod
            ? `${Math.floor(tempo_wod/60)}:${String(tempo_wod%60).padStart(2,'0')}`
            : `${rounds} rondas`;

        // Buscar benchmark existente
        const { data: existentes } = await db
            .from('benchmarks')
            .select('*')
            .ilike('nome', nome)
            .eq('tipo', tipo)
            .order('created_at', { ascending: false })
            .limit(1);

        if (!existentes || existentes.length === 0) {
            // Nao existe — criar
            await db.from('benchmarks').insert({
                nome, resultado: valorAtual, tipo, data,
                notas: 'Registado automaticamente'
            });
            return '🏆 Novo benchmark!';
        }

        const anterior = existentes[0];
        let eMelhor = false;

        if (tipo === 'tempo') {
            const partes = anterior.resultado.split(':');
            const segsAnteriores = partes.length === 2
                ? parseInt(partes[0]) * 60 + parseInt(partes[1])
                : parseInt(anterior.resultado) * 60;
            eMelhor = tempo_wod < segsAnteriores;
        } else {
            const rondasAnteriores = parseInt(anterior.resultado);
            eMelhor = rounds > rondasAnteriores;
        }

        if (eMelhor) {
            await db.from('benchmarks').insert({
                nome, resultado: valorAtual, tipo, data,
                notas: `Novo recorde! Anterior: ${anterior.resultado}`
            });
            return '🏆 Novo recorde pessoal!';
        }

        return null;
    } catch(e) {
        console.error('Erro benchmark:', e);
        return null;
    }
}

async function mostrarResumoFinal(sessao, exercicios, benchmarkMsg) {
    const tempo = sessao.tempo_wod
        ? Math.floor(sessao.tempo_wod/60) + ':' + String(sessao.tempo_wod%60).padStart(2,'0')
        : null;

    // Gerar texto para copiar para o Claude
    let textoResumo = '## Sessão de treino — ' + sessao.data + '\n';
    textoResumo += '**Treino:** ' + sessao.nome_treino + '\n';
    if (tempo) textoResumo += '**Tempo WOD:** ' + tempo + '\n';
    if (sessao.rounds_completos) textoResumo += '**Rondas:** ' + sessao.rounds_completos + '\n';
    if (sessao.notas) textoResumo += '**Notas:** ' + sessao.notas + '\n';
    if (exercicios.length > 0) {
        textoResumo += '\n### Exercícios\n';
        exercicios.forEach(ex => {
            textoResumo += '- **' + ex.nome + '**';
            if (ex.peso_kg) textoResumo += ' — ' + ex.peso_kg + 'kg';
            if (ex.reps) textoResumo += ' × ' + ex.reps;
            textoResumo += '\n';
        });
    }

    // Criar overlay de resumo final
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:var(--fundo);z-index:400;overflow-y:auto;padding:20px;';

    const tempoHTML = tempo ? '<span style="font-family:monospace;font-size:2rem;font-weight:700;color:var(--laranja);">⏱ ' + tempo + '</span>' : '';
    const rondasHTML = sessao.rounds_completos ? '<span style="font-size:1.2rem;font-weight:600;color:var(--verde);">🔄 ' + sessao.rounds_completos + ' rondas</span>' : '';
    const benchHTML = benchmarkMsg ? '<div style="background:var(--verde);color:white;border-radius:var(--radius-sm);padding:12px 16px;margin:14px 0;font-weight:700;font-size:1rem;">' + benchmarkMsg + '</div>' : '';

    overlay.innerHTML = [
        '<div style="max-width:600px;margin:0 auto;">',
        '<div style="text-align:center;padding:24px 0 16px;">',
        '<div style="font-size:3rem;margin-bottom:8px;">🎉</div>',
        '<div style="font-size:1.4rem;font-weight:700;color:var(--azul-escuro);">Treino concluído!</div>',
        '<div style="font-size:0.9rem;color:var(--cinza-meio);margin-top:4px;">' + sessao.nome_treino + '</div>',
        '</div>',
        benchHTML,
        '<div style="display:flex;gap:16px;justify-content:center;margin:16px 0;flex-wrap:wrap;">',
        tempoHTML,
        rondasHTML,
        '</div>',
        '<div class="card">',
        '<div class="card-titulo">Resumo para o Claude</div>',
        '<p style="font-size:0.82rem;color:var(--cinza-meio);margin-bottom:10px;">Copia e envia ao Claude para análise.</p>',
        '<textarea id="resumo-final-texto" readonly style="width:100%;border:1.5px solid var(--cinza-borda);border-radius:var(--radius-sm);padding:10px;font-family:monospace;font-size:0.75rem;resize:vertical;min-height:140px;color:var(--cinza-texto);background:var(--fundo);outline:none;">' + textoResumo + '</textarea>',
        '<button class="btn btn-primario" style="margin-top:8px;" onclick="copiarResumoFinal()">📋 Copiar resumo</button>',
        '</div>',
        '<div class="card">',
        '<div class="card-titulo">💡 Sugestões do Claude</div>',
        '<p style="font-size:0.82rem;color:var(--cinza-meio);margin-bottom:10px;">Cola aqui o feedback do Claude e guarda.</p>',
        '<textarea id="sugestoes-final" placeholder="Cola aqui as sugestões do Claude..." style="width:100%;border:1.5px solid var(--cinza-borda);border-radius:var(--radius-sm);padding:10px;font-family:sans-serif;font-size:0.85rem;resize:vertical;min-height:100px;outline:none;"></textarea>',
        '<button class="btn btn-secundario" style="margin-top:8px;width:100%;" onclick="guardarSugestoesFinais(\"' + sessao.id + '\")">Guardar sugestões</button>',
        '</div>',
        '<a href="index.html" class="btn btn-primario" style="margin-bottom:40px;">← Voltar ao dashboard</a>',
        '</div>'
    ].join('');

    document.body.appendChild(overlay);
    window.scrollTo(0, 0);
}

async function copiarResumoFinal() {
    const texto = document.getElementById('resumo-final-texto').value;
    try {
        await navigator.clipboard.writeText(texto);
        mostrarToast('Copiado ✓');
    } catch(e) {
        document.getElementById('resumo-final-texto').select();
        mostrarToast('Seleciona e copia manualmente');
    }
}

async function guardarSugestoesFinais(sessaoId) {
    const sugestoes = document.getElementById('sugestoes-final').value.trim();
    if (!sugestoes) return;
    const { error } = await db.from('sessoes_treino').update({ sugestoes_claude: sugestoes }).eq('id', sessaoId);
    if (error) mostrarToast('Erro ao guardar 😕');
    else mostrarToast('Sugestões guardadas ✓');
}


async function analisarComClaude(sessaoId) {
    var btn = document.getElementById('btn-analisar');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ A analisar...'; }

    try {
        var resp = await db.from('sessoes_treino').select('*, exercicios_sessao(*)').eq('id', sessaoId).limit(1);
        var s = resp.data && resp.data.length > 0 ? resp.data[0] : null;
        if (!s) { mostrarToast('Sessão não encontrada'); return; }

        var exs = (s.exercicios_sessao || []).sort(function(a,b) { return a.ordem - b.ordem; });
        var tempo = s.tempo_wod
            ? Math.floor(s.tempo_wod/60) + ':' + String(s.tempo_wod%60).padStart(2,'0')
            : null;

        var resumo = '## Sessão de treino — ' + s.data + '
';
        resumo += '**Treino:** ' + s.nome_treino + '
';
        if (tempo) resumo += '**Tempo WOD:** ' + tempo + '
';
        if (s.rounds_completos) resumo += '**Rondas:** ' + s.rounds_completos + '
';
        if (s.notas) resumo += '**Notas:** ' + s.notas + '
';
        if (exs.length > 0) {
            resumo += '
### Exercícios
';
            exs.forEach(function(ex) {
                resumo += '- **' + ex.nome + '**';
                if (ex.peso_kg) resumo += ' — ' + ex.peso_kg + 'kg';
                if (ex.reps) resumo += ' x ' + ex.reps;
                resumo += '
';
            });
        }
        if (s.sugestoes_claude) resumo += '
### Sugestões anteriores
' + s.sugestoes_claude;

        var response = await fetch('https://treinos-claude.jujutfigueiredo.workers.dev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo: 'analisar_treino', dados: { resumo: resumo } })
        });

        var result = await response.json();
        if (result.error) throw new Error(result.error);

        // Mostrar overlay com resultado
        var overlay = document.createElement('div');
        overlay.id = 'overlay-analise';
        overlay.style.cssText = 'position:fixed;inset:0;background:var(--fundo);z-index:400;overflow-y:auto;padding:20px;';

        var textoSeguro = result.texto.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        var partes = [];
        partes.push('<div style="max-width:600px;margin:0 auto;">');
        partes.push('<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">');
        partes.push('<button id="btn-fechar-analise" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--cinza-meio);">‹</button>');
        partes.push('<h2 style="font-size:1.1rem;font-weight:700;color:var(--azul-escuro);">Análise do Claude</h2>');
        partes.push('</div>');
        partes.push('<div class="card" style="white-space:pre-wrap;font-size:0.88rem;line-height:1.6;color:var(--cinza-texto);">' + textoSeguro + '</div>');
        partes.push('<div class="card" style="margin-top:12px;">');
        partes.push('<div class="card-titulo">💡 Guardar sugestões</div>');
        partes.push('<textarea id="analise-sugestoes" style="width:100%;border:1.5px solid var(--cinza-borda);border-radius:var(--radius-sm);padding:10px;font-family:sans-serif;font-size:0.85rem;resize:vertical;min-height:100px;outline:none;"></textarea>');
        partes.push('<button class="btn btn-primario" id="btn-guardar-analise" style="margin-top:8px;">Guardar sugestões</button>');
        partes.push('</div></div>');

        overlay.innerHTML = partes.join('');
        document.body.appendChild(overlay);

        // Preencher textarea depois de criar o overlay
        document.getElementById('analise-sugestoes').value = result.texto;

        // Event listeners
        document.getElementById('btn-fechar-analise').addEventListener('click', function() {
            overlay.remove();
        });
        document.getElementById('btn-guardar-analise').addEventListener('click', function() {
            guardarSugestoesAnalise(sessaoId);
        });

    } catch(e) {
        console.error(e);
        mostrarToast('Erro na análise 😕');
    }
    if (btn) { btn.disabled = false; btn.textContent = '🤖 Analisar com Claude'; }
}

async function guardarSugestoesAnalise(sessaoId) {
    var texto = document.getElementById('analise-sugestoes').value.trim();
    if (!texto) return;
    var r = await db.from('sessoes_treino').update({ sugestoes_claude: texto }).eq('id', sessaoId);
    if (r.error) mostrarToast('Erro ao guardar 😕');
    else { mostrarToast('Sugestões guardadas ✓'); }
}

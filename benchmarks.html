<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Benchmarks</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232A9D8F'/><polygon points='58,8 33,52 50,52 38,92 67,48 50,48' fill='white'/></svg>">
</head>
<body>

<header class="header">
    <div style="display:flex; align-items:center; gap:10px;">
        <a href="index.html" style="color:var(--cinza-meio); display:flex;">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1>Benchmarks</h1>
    </div>
    <button class="btn btn-primario" style="width:auto; padding:8px 14px; font-size:0.85rem;" onclick="abrirModal()">
        + Novo
    </button>
</header>

<div class="page active">

    <!-- Secção WODs -->
    <div style="font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--cinza-meio); margin-bottom:8px; margin-top:4px;">⏱ WODs & Recordes</div>
    <div id="benchmarks-lista"></div>

    <!-- Secção Evolução por Exercício -->
    <div style="font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--cinza-meio); margin-bottom:8px; margin-top:16px;">💪 Evolução por exercício</div>
    <div id="exercicios-evolucao">
        <div class="card" style="text-align:center; padding:20px; color:var(--cinza-meio); font-size:0.9rem;">A carregar...</div>
    </div>
        <div class="card" style="text-align:center; padding:32px;">
            <div style="font-size:2rem; margin-bottom:8px;">🏆</div>
            <div style="font-weight:600; color:var(--azul-escuro);">Sem benchmarks ainda</div>
            <div style="font-size:0.85rem; color:var(--cinza-meio); margin-top:6px;">Regista os teus tempos e recordes pessoais.</div>
            <button class="btn btn-primario" style="margin-top:16px;" onclick="abrirModal()">Adicionar benchmark</button>
        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-benchmark">
    <div class="modal">
        <div class="modal-titulo" id="modal-titulo">Novo benchmark</div>

        <div class="form-grupo">
            <label>Nome</label>
            <input type="text" id="b-nome" placeholder="ex: Chipper, AMRAP, Fran...">
        </div>
        <div class="form-grupo">
            <label>Resultado</label>
            <input type="text" id="b-resultado" placeholder="ex: 9:02, 7 rondas, 45kg...">
        </div>
        <div class="form-grupo">
            <label>Tipo</label>
            <select id="b-tipo">
                <option value="tempo">⏱ Tempo (menos = melhor)</option>
                <option value="rondas">🔄 Rondas (mais = melhor)</option>
                <option value="peso">🏋️ Peso (mais = melhor)</option>
                <option value="outro">📝 Outro</option>
            </select>
        </div>
        <div class="form-grupo">
            <label>Data</label>
            <input type="date" id="b-data">
        </div>
        <div class="form-grupo">
            <label>Notas</label>
            <textarea id="b-notas" placeholder="Contexto, condições, sensações..."></textarea>
        </div>

        <div style="display:flex; gap:8px;">
            <button class="btn btn-secundario" style="flex:1;" onclick="fecharModal()">Cancelar</button>
            <button class="btn btn-primario" style="flex:2;" id="btn-guardar" onclick="guardarBenchmark()">Guardar</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>

async function verificarAuth() {
    const { data: { user } } = await db.auth.getUser();
    if (!user) window.location.href = 'login.html';
}
verificarAuth();

let benchmarks = [];
let editandoId = null;

function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('b-data').value = new Date().toISOString().split('T')[0];
    await carregarBenchmarks();
    await carregarExerciciosEvolucao();
});

async function carregarBenchmarks() {
    const { data } = await db
        .from('benchmarks')
        .select('*')
        .order('created_at', { ascending: false });

    benchmarks = data || [];
    renderBenchmarks();
}

function renderBenchmarks() {
    const el = document.getElementById('benchmarks-lista');
    if (benchmarks.length === 0) {
        el.innerHTML = `
            <div class="card" style="text-align:center; padding:32px;">
                <div style="font-size:2rem; margin-bottom:8px;">🏆</div>
                <div style="font-weight:600; color:var(--azul-escuro);">Sem benchmarks ainda</div>
                <div style="font-size:0.85rem; color:var(--cinza-meio); margin-top:6px;">Regista os teus tempos e recordes pessoais.</div>
                <button class="btn btn-primario" style="margin-top:16px;" onclick="abrirModal()">Adicionar benchmark</button>
            </div>`;
        return;
    }

    // Agrupar por nome
    const grupos = {};
    for (const b of benchmarks) {
        if (!grupos[b.nome]) grupos[b.nome] = [];
        grupos[b.nome].push(b);
    }

    el.innerHTML = Object.entries(grupos).map(([nome, registos]) => {
        // Ordenar para encontrar o melhor resultado
        const tipo = registos[0]?.tipo || 'outro';
        const ordenados = [...registos].sort((a, b) => {
            if (tipo === 'tempo') {
                // Tempo: menos é melhor — converter para segundos
                const toSecs = r => {
                    const p = r.resultado.split(':');
                    return p.length === 2 ? parseInt(p[0])*60 + parseInt(p[1]) : parseInt(r.resultado)*60;
                };
                return toSecs(a) - toSecs(b);
            } else if (tipo === 'rondas' || tipo === 'peso') {
                // Rondas/peso: mais é melhor
                return parseFloat(b.resultado) - parseFloat(a.resultado);
            }
            return 0;
        });
        const melhor = ordenados[0]; // melhor resultado
        // Histórico: restantes ordenados por data desc
        const historico = [...registos].filter(r => r.id !== melhor.id).sort((a, b) => b.data?.localeCompare(a.data));
        const tipoIcon = { tempo: '⏱', rondas: '🔄', peso: '🏋️', outro: '📝' }[melhor.tipo || 'outro'] || '📝';

        const historicoHTML = historico.length > 0 ? historico.map(r => {
            const data = new Date(r.data + 'T00:00:00').toLocaleDateString('pt-PT', { day: 'numeric', month: 'short', year: 'numeric' });
            return `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-top:1px solid var(--cinza-claro); font-size:0.8rem; color:var(--cinza-meio);">
                    <span>${data}</span>
                    <span style="font-family:'DM Mono',monospace;">${r.resultado}</span>
                </div>`;
        }).join('') : '';

        const dataFormatada = melhor.data
            ? new Date(melhor.data + 'T00:00:00').toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' })
            : '';

        return `
            <div class="card" style="margin-bottom:12px;">
                <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px;">
                    <div>
                        <div style="font-size:0.75rem; color:var(--cinza-meio); font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px;">
                            ${tipoIcon} ${nome}
                        </div>
                        <div style="display:flex; align-items:baseline; gap:8px;">
                            <div style="font-family:'DM Mono',monospace; font-size:1.8rem; font-weight:700; color:var(--verde); line-height:1;">
                                ${melhor.resultado}
                            </div>
                            <span style="font-size:0.7rem; background:var(--verde-claro); color:var(--verde); padding:2px 6px; border-radius:99px; font-weight:600;">🏆 Melhor</span>
                        </div>
                        <div style="font-size:0.75rem; color:var(--cinza-meio); margin-top:4px;">${dataFormatada}</div>
                        ${melhor.notas ? `<div style="font-size:0.78rem; color:var(--cinza-meio); margin-top:4px; font-style:italic;">${melhor.notas}</div>` : ''}
                    </div>
                    <div style="display:flex; gap:6px;">
                        <button onclick="editarBenchmark('${melhor.id}')" style="background:var(--cinza-claro); border:none; border-radius:var(--radius-sm); padding:6px 10px; cursor:pointer; font-size:0.8rem;">✏️</button>
                        <button onclick="adicionarResultado('${nome}', '${melhor.tipo || 'outro'}')" style="background:var(--verde-claro); border:none; border-radius:var(--radius-sm); padding:6px 10px; cursor:pointer; font-size:0.8rem; color:var(--verde); font-weight:600;">+ Novo</button>
                    </div>
                </div>
                ${historico.length > 0 ? `
                <div style="margin-top:8px;">
                    <div style="font-size:0.72rem; font-weight:600; color:var(--cinza-meio); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px;">Histórico</div>
                    ${historicoHTML}
                </div>` : ''}
            </div>`;
    }).join('');
}

// ---- MODAL ----
function abrirModal(nome = '', tipo = 'tempo') {
    editandoId = null;
    document.getElementById('modal-titulo').textContent = 'Novo benchmark';
    document.getElementById('btn-guardar').textContent = 'Guardar';
    document.getElementById('b-nome').value = nome;
    document.getElementById('b-tipo').value = tipo;
    document.getElementById('b-resultado').value = '';
    document.getElementById('b-notas').value = '';
    document.getElementById('b-data').value = new Date().toISOString().split('T')[0];
    document.getElementById('modal-benchmark').classList.add('open');
    if (!nome) document.getElementById('b-nome').focus();
    else document.getElementById('b-resultado').focus();
}

function adicionarResultado(nome, tipo) {
    abrirModal(nome, tipo);
}

function editarBenchmark(id) {
    const b = benchmarks.find(x => x.id === id);
    if (!b) return;
    editandoId = id;
    document.getElementById('modal-titulo').textContent = 'Editar benchmark';
    document.getElementById('btn-guardar').textContent = 'Atualizar';
    document.getElementById('b-nome').value = b.nome;
    document.getElementById('b-tipo').value = b.tipo || 'outro';
    document.getElementById('b-resultado').value = b.resultado;
    document.getElementById('b-notas').value = b.notas || '';
    document.getElementById('b-data').value = b.data || new Date().toISOString().split('T')[0];
    document.getElementById('modal-benchmark').classList.add('open');
}

function fecharModal() {
    document.getElementById('modal-benchmark').classList.remove('open');
    editandoId = null;
}

document.getElementById('modal-benchmark').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-benchmark')) fecharModal();
});

async function guardarBenchmark() {
    const nome = document.getElementById('b-nome').value.trim();
    const resultado = document.getElementById('b-resultado').value.trim();
    if (!nome || !resultado) { mostrarToast('Preenche o nome e o resultado'); return; }

    const payload = {
        nome,
        resultado,
        tipo: document.getElementById('b-tipo').value,
        data: document.getElementById('b-data').value || null,
        notas: document.getElementById('b-notas').value.trim() || null
    };

    let error;
    if (editandoId) {
        ({ error } = await db.from('benchmarks').update(payload).eq('id', editandoId));
    } else {
        ({ error } = await db.from('benchmarks').insert(payload));
    }

    if (error) { mostrarToast('Erro ao guardar 😕'); return; }
    mostrarToast(editandoId ? 'Atualizado ✓' : 'Benchmark guardado ✓');
    fecharModal();
    await carregarBenchmarks();
}

async function carregarExerciciosEvolucao() {
    const el = document.getElementById('exercicios-evolucao');
    if (!el) return;

    // Buscar todas as sessões com exercícios
    const { data: sessoes } = await db
        .from('sessoes_treino')
        .select('id, data, nome_treino, exercicios_sessao(nome, peso_kg, reps)')
        .order('data', { ascending: false })
        .limit(30);

    if (!sessoes || sessoes.length === 0) {
        el.innerHTML = '<div class="card" style="text-align:center; padding:20px; color:var(--cinza-meio); font-size:0.9rem;">Sem sessões registadas ainda.</div>';
        return;
    }

    // Agrupar exercícios por nome (normalizado)
    const porExercicio = {};
    for (const sessao of sessoes) {
        if (!sessao.exercicios_sessao) continue;
        for (const ex of sessao.exercicios_sessao) {
            // Normalizar nome — remover "(R1)", "(R2)", etc.
            const nomeBase = ex.nome.replace(/\s*\(R\d+\)\s*/g, '').trim();
            if (!nomeBase || !ex.peso_kg) continue;
            if (!porExercicio[nomeBase]) porExercicio[nomeBase] = [];
            // Só adicionar se não tiver já para esta sessão
            const jaExiste = porExercicio[nomeBase].some(e => e.sessao_id === sessao.id);
            if (!jaExiste) {
                porExercicio[nomeBase].push({
                    sessao_id: sessao.id,
                    data: sessao.data,
                    peso_kg: ex.peso_kg,
                    reps: ex.reps
                });
            }
        }
    }

    // Filtrar exercícios com pelo menos 2 registos
    const comHistorico = Object.entries(porExercicio)
        .filter(([, registos]) => registos.length >= 1)
        .sort((a, b) => a[0].localeCompare(b[0]));

    if (comHistorico.length === 0) {
        el.innerHTML = '<div class="card" style="text-align:center; padding:20px; color:var(--cinza-meio); font-size:0.9rem;">Regista pesos nas sessões para ver a evolução aqui.</div>';
        return;
    }

    el.innerHTML = comHistorico.map(([nome, registos]) => {
        // Ordenar por data desc
        const ordenados = [...registos].sort((a, b) => b.data.localeCompare(a.data));
        const ultimo = ordenados[0];
        const anterior = ordenados[1];

        // Calcular diferença
        let diffHTML = '';
        if (anterior && ultimo.peso_kg && anterior.peso_kg) {
            const diff = (ultimo.peso_kg - anterior.peso_kg).toFixed(1);
            if (parseFloat(diff) > 0) {
                diffHTML = '<span style="font-size:0.72rem; background:#DCFCE7; color:#16A34A; padding:2px 8px; border-radius:99px; font-weight:600; margin-left:6px;">+' + diff + 'kg ⬆️</span>';
            } else if (parseFloat(diff) < 0) {
                diffHTML = '<span style="font-size:0.72rem; background:#FEE2E2; color:#DC2626; padding:2px 8px; border-radius:99px; font-weight:600; margin-left:6px;">' + diff + 'kg ⬇️</span>';
            } else {
                diffHTML = '<span style="font-size:0.72rem; background:var(--cinza-claro); color:var(--cinza-meio); padding:2px 8px; border-radius:99px; font-weight:600; margin-left:6px;">= igual</span>';
            }
        }

        // Histórico simplificado
        const historicoHTML = ordenados.slice(0, 4).map((r, i) => {
            const dataStr = new Date(r.data + 'T00:00:00').toLocaleDateString('pt-PT', { day: 'numeric', month: 'short' });
            const isMais = i > 0 && r.peso_kg < ordenados[i-1].peso_kg;
            const isMenos = i > 0 && r.peso_kg > ordenados[i-1].peso_kg;
            return '<div style="display:flex; justify-content:space-between; padding:5px 0; border-top:1px solid var(--cinza-claro); font-size:0.78rem;">'
                + '<span style="color:var(--cinza-meio);">' + dataStr + '</span>'
                + '<span style="font-family:monospace; font-weight:600; color:' + (i === 0 ? 'var(--verde)' : 'var(--cinza-texto)') + ';">' + r.peso_kg + ' kg' + (r.reps ? ' × ' + r.reps : '') + '</span>'
                + '</div>';
        }).join('');

        return '<div class="card" style="margin-bottom:10px;">'
            + '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">'
            + '<div style="font-size:0.8rem; font-weight:700; color:var(--azul-escuro);">' + nome + '</div>'
            + '<div style="display:flex; align-items:baseline; gap:4px;">'
            + '<span style="font-family:monospace; font-size:1.3rem; font-weight:700; color:var(--verde);">' + ultimo.peso_kg + ' kg</span>'
            + diffHTML
            + '</div>'
            + '</div>'
            + historicoHTML
            + '</div>';
    }).join('');
}

</script>
</body>
</html>
